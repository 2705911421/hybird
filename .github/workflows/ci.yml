name: authority-gates

on:
  push:
  pull_request:

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python hybrid/scripts/check_architecture.py

  story-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: python -m pip install -e "hybrid/story-runtime[test]"
      - run: python -m pip check
      - run: python -m compileall -q src
        working-directory: hybrid/story-runtime
      - run: python -m pytest
        working-directory: hybrid/story-runtime

  inkos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: inkos/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
        working-directory: inkos
      - run: pnpm typecheck
        working-directory: inkos
      - run: pnpm build
        working-directory: inkos
      - run: pnpm test
        working-directory: inkos
